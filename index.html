<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CommitPay — Controle financeiro completo com metas, orçamento e relatórios." />
    <title>CommitPay — Controle financeiro inteligente</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='22'%3E%F0%9F%92%B5%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2dd4bf">
    <link rel="apple-touch-icon" href="icon-192.png">
  </head>
  <body>
    <div id="app">
      <!-- Sidebar desktop -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon">💵</div>
          <div>
            <p class="brand-title">CommitPay</p>
            <p class="brand-subtitle">Controle financeiro</p>
          </div>
        </div>
        <nav class="nav" id="nav"></nav>
        <div class="sidebar-backup" style="padding: 0 16px; margin-top: 20px;">
          <p style="font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase;">Dados</p>
          <button class="btn btn-outline" style="width: 100%; margin-bottom: 8px;" onclick="exportData()">⬇️ Exportar Dados</button>
          <label class="btn btn-ghost" style="width: 100%; cursor: pointer; text-align: center;">
            ⬆️ Importar Dados
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
          </label>
        </div>
        <div class="sidebar-tip">
          <p class="tip-title">💡 Dica do dia</p>
          <p class="tip-text">Reserve 20% das receitas para investir no seu futuro.</p>
        </div>
      </aside>

      <div class="main">
        <header class="topbar">
          <button class="icon-btn menu-toggle" id="menuBtn" aria-label="Abrir menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <div class="brand-mobile">
            <div class="brand-icon brand-icon--sm">💵</div>
            <span>CommitPay</span>
          </div>
          <div class="topbar-info">
            <header class="topbar">
            <button class="icon-btn menu-toggle" id="menuBtn" aria-label="Abrir menu">
            </button>
            <div class="topbar-info" style="flex: 1; display: flex; justify-content: space-between; align-items: center;">
            <div>
              <p class="topbar-date" id="topbarDate"></p>
              <h2 class="topbar-title" id="topbarTitle">Dashboard</h2>
            </div>
            <button class="icon-btn" id="themeToggleBtn" onclick="toggleTheme()" aria-label="Mudar Tema" style="font-size: 20px;">☀️</button>
            </div>
            </header>
          </div>
        </header>
        <main class="content" id="view"></main>
      </div>

      <!-- Drawer mobile -->
      <div class="drawer" id="drawer" hidden>
        <div class="drawer-overlay" data-close></div>
        <aside class="drawer-panel">
          <button class="icon-btn drawer-close" data-close aria-label="Fechar menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
          <div class="sidebar-brand">
            <div class="brand-icon">💵</div>
            <div>
              <p class="brand-title">CommitPay</p>
              <p class="brand-subtitle">Controle financeiro</p>
            </div>
          </div>
          <nav class="nav" id="navMobile"></nav>
        </aside>
      </div>

      <!-- Modais -->
      <div class="modal" id="modal" hidden>
        <div class="modal-overlay" data-close></div>
        <div class="modal-panel" id="modalPanel"></div>
      </div>

      <!-- Confirm dialog -->
      <div class="modal" id="confirm" hidden>
        <div class="modal-overlay" data-confirm-close></div>
        <div class="modal-panel modal-panel--sm">
          <h3 class="modal-title" id="confirmTitle"></h3>
          <p class="modal-desc" id="confirmDesc"></p>
          <div class="modal-actions">
            <button class="btn btn-ghost" data-confirm-close>Cancelar</button>
            <button class="btn btn-danger" id="confirmOk">Excluir</button>
          </div>
        </div>
      </div>

      <!-- Toaster -->
      <div class="toaster" id="toaster"></div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
